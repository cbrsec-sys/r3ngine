# APME Attack Rules Configuration V2
#
# Rule format:
#   name: unique identifier
#   mitre_id: ATT&CK technique ID (optional)
#   if:
#     node.type: <Node type>
#     node.subtype: <Node subtype>
#     node.property: <key:value>
#   then:
#     create_edge:
#       type: <EDGE_TYPE>
#       target_subtype: <subtype>
#       confidence: <0.0-1.0>

rules:

  # --------------------------------------------------------------------------
  # High-Impact Vulnerabilities -> Capability
  # --------------------------------------------------------------------------

  - name: sqli_to_db_access
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: sqli
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: db_access
        confidence: 0.90

  - name: rce_to_execution
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: rce
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: rce_execution
        confidence: 0.95

  - name: ssti_to_rce
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: ssti
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: rce_execution
        confidence: 0.85

  # --------------------------------------------------------------------------
  # Sensitivity-Aware Rules (Targeting HVTs)
  # --------------------------------------------------------------------------

  - name: any_vuln_on_hvt
    description: "Any vulnerability on a High Value Target is a major risk"
    if:
      node.type: Vulnerability
    then:
      # This rule only triggers if the vulnerability is EXPOSED by a high-sensitivity asset
      # We'll handle the logic for 'parent property' in the rules engine refactor
      create_edge:
        type: LEADS_TO
        target_subtype: hvt_compromise
        confidence: 0.50

  # --------------------------------------------------------------------------
  # Post-Exploitation / Pivoting
  # --------------------------------------------------------------------------

  - name: execution_to_pivot
    mitre_id: "T1090"
    if:
      node.type: Capability
      node.subtype: rce_execution
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: pivot
        confidence: 0.85

  - name: pivot_to_internal_discovery
    mitre_id: "T1046"
    if:
      node.type: Capability
      node.subtype: pivot
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: internal_discovery
        confidence: 0.80

  # --------------------------------------------------------------------------
  # Authentication & Identity
  # --------------------------------------------------------------------------

  - name: bypass_to_auth_access
    mitre_id: "T1548"
    if:
      node.type: Vulnerability
      node.subtype: misconfig
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.75

  - name: creds_to_auth_access
    mitre_id: "T1078"
    if:
      node.type: Credential
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.95

  - name: ssrf_to_cloud_access
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: cloud_access
        confidence: 0.80

  - name: ssrf_to_pivot
    mitre_id: "T1090"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: pivot
        confidence: 0.75

  - name: lfi_to_rce
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: lfi
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: rce_execution
        confidence: 0.70

  - name: lfi_to_data_exfil
    mitre_id: "T1083"
    if:
      node.type: Vulnerability
      node.subtype: lfi
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: data_exfil
        confidence: 0.80

  - name: xxe_to_data_exfil
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: xxe
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: data_exfil
        confidence: 0.75

  - name: xxe_to_ssrf
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: xxe
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: ssrf
        confidence: 0.70

  - name: xss_to_auth_access
    mitre_id: "T1189"
    if:
      node.type: Vulnerability
      node.subtype: xss
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.60

  - name: redirect_to_auth_access
    mitre_id: "T1204.001"
    if:
      node.type: Vulnerability
      node.subtype: open_redirect
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.50
