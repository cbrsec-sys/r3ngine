# Category Q — API & Modern Web (10 rules)
rules:

  - name: mass_assignment_to_privilege_escalation
    mitre_id: "T1548"
    if:
      node.type: Vulnerability
      node.subtype: mass_assignment
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.70

  - name: mass_assignment_verified_to_account_takeover
    mitre_id: "T1548"
    if:
      node.type: Vulnerability
      node.subtype: mass_assignment
      node.property: "validated:True"
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: account_takeover
        confidence: 0.85

