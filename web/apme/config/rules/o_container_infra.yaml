# Category O — Container & Infrastructure (10 rules)
rules:

  - name: docker_socket_exposed_to_container_escape
    mitre_id: "T1610"
    if:
      node.type: Vulnerability
      node.subtype: docker_socket_exposed
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: container_escape_capability
        confidence: 0.90
        requires_docker: true

