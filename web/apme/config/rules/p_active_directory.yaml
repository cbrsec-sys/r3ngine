# Category P — Active Directory (14 rules)
rules:

  - name: ntlm_relay_to_lateral_movement
    mitre_id: "T1557.001"
    if:
      node.type: Vulnerability
      node.subtype: ntlm_relay
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: lateral_movement
        confidence: 0.85
        requires_active_directory: true

  - name: ntlm_relay_to_domain_admin
    mitre_id: "T1557.001"
    if:
      node.type: Vulnerability
      node.subtype: ntlm_relay
