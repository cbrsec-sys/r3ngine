# Category G — Information Disclosure (6 rules)
rules:

  - name: cors_to_data_exfil
    mitre_id: "T1557"
    if:
      node.type: Vulnerability
      node.subtype: cors
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: data_exfil
        confidence: 0.70
        requires_victim: true

  - name: debug_endpoint_to_data_exfil
