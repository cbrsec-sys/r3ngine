# Category W — Identity Infrastructure (6 rules)
# Fires from IdentityInfra nodes to Capability virtual goal nodes.
# All target_subtype values appear in schema.py NODE_TYPES["Capability"].
rules:

  - name: adfs_external_to_saml_assertion_forgery
    mitre_id: "T1606.002"
    if:
      node.type: IdentityInfra
      node.subtype: adfs
      node.property: "is_externally_accessible:True"
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: saml_assertion_forgery
        confidence: 0.82

  - name: owa_external_to_account_takeover
    mitre_id: "T1078.002"
