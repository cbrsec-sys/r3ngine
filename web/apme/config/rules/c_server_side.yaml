  - name: blind_ssrf_verified_to_cloud_access
    mitre_id: "T1552.005"
    if:
      node.type: Vulnerability
      node.subtype: blind_ssrf
      node.property: "validated:True"
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: cloud_access
        confidence: 0.80

  - name: ssrf_to_redis_rce
    mitre_id: "T1090"
