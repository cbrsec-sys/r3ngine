      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: rce_execution
        confidence: 0.75
        requires_redis: true

  - name: http_request_smuggling_to_auth_bypass
    mitre_id: "T1557"
    if:
      node.type: Vulnerability
      node.subtype: http_request_smuggling
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: authenticated_access
        confidence: 0.70

  - name: http_request_smuggling_to_data_exfil
    mitre_id: "T1557"
