# Category C — Server-Side Exploitation (7 rules)
rules:

  - name: rce_to_execution
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: rce
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: rce_execution
        confidence: 0.95

  - name: ssrf_to_cloud_access
    mitre_id: "T1190"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: cloud_access
        confidence: 0.80

  - name: ssrf_to_pivot
    mitre_id: "T1090"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: pivot
        confidence: 0.75

  - name: ssrf_to_metadata_access
    mitre_id: "T1552.005"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
    then:
      create_edge:
        type: LEADS_TO
        target_subtype: metadata_access
        confidence: 0.85

  - name: ssrf_to_internal_service
    mitre_id: "T1090"
    if:
      node.type: Vulnerability
      node.subtype: ssrf
