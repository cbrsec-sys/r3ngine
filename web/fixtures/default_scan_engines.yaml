      brute_force_scan: {\n  'users_wordlist': ['top_default_usernames.txt',\n\
      \  'most_common_usernames.txt'],\n  'pass_wordlist': ['top_default_passwords.txt',\n\
      \  'most_common_passwords.txt'],\n  'services': ['ssh', 'ftp', 'http', 'smb',\n\
