- fields:
    default_engine: true
    engine_name: Firewall and VPN (Sophos)
    yaml_configuration: "subdomain_discovery: {\n  'uses_tools': ['subfinder'],\n\
      \  'enable_http_crawl': true,\n  'threads': 10,\n  'timeout': 5\n}\n\
      port_scan: {\n  'enable_http_crawl': true,\n  'timeout': 5,\n  'ports':\n\
      \  ['80', '443', '4444', '8443', '22', '500', '4500', '1194'],\n  'rate_limit': 100,\n\
      \  'threads': 20,\n  'passive': false,\n  'enable_nmap': true,\n  'nmap_cmd':\n\
      \  '-sV --script vuln'\n}\nvulnerability_scan: {\n  'run_nuclei': true,\n\
      \  'run_dalfox': false,\n  'run_crlfuzz': false,\n  'run_s3scanner': false,\n\
