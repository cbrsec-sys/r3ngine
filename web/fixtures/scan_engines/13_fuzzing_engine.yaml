- model: scanEngine.enginetype
  pk: 13
  fields:
    engine_name: Fuzzing Engine
    default_engine: false
    yaml_configuration: |
      subdomain_discovery:
        uses_tools:
          - subfinder
          - ctfr
          - sublist3r
          - tlsx
          - oneforall
          - netlas
          - chaos
          - baddns
        enable_http_crawl: true
        threads: 30
        timeout: 5
      fetch_url:
        uses_tools:
          - gospider
          - hakrawler
          - waybackurls
          - katana
          - gau
          - vigolium
        remove_duplicate_endpoints: true
        duplicate_fields:
          - content_length
          - page_title
        enable_http_crawl: true
        gf_patterns:
          - debug_logic
          - idor
          - interestingEXT
          - interestingparams
          - interestingsubs
          - lfi
          - rce
          - redirect
          - sqli
          - ssrf
          - ssti
          - xss
        ignore_file_extensions:
          - png
          - jpg
          - jpeg
          - gif
          - mp4
          - mpeg
          - mp3
        threads: 20
      dir_file_fuzz:
        auto_calibration: true
        run_dirsearch: true
        run_feroxbuster: false
        enable_http_crawl: true
        rate_limit: 150
        extensions:
          - html
          - php
          - git
          - yaml
          - conf
          - cnf
          - config
          - gz
          - env
          - log
          - db
          - mysql
          - bak
          - asp
          - aspx
          - txt
          - sql
          - json
          - yml
          - pdf
        follow_redirect: true
        max_time: 300
        match_http_status:
          - 200
          - 204
        recursive_level: 2
        stop_on_error: false
        timeout: 120
        threads: 20
        wordlist_name: dicc
        use_api_wordlist: false
      http_crawl: {}
      param_discovery:
        enabled: true
        min_confidence: 50
      url_fuzz:
        fuzzers:
          - ffuf
          - feroxbuster
        hunt_secrets: true
      url_crawl:
        passive: false
        active: false
        hunt_secrets: true
      url_params_fuzz:
        fuzz_values: true
        hunt_secrets: false
      url_dirsearch:
        hunt_secrets: false
