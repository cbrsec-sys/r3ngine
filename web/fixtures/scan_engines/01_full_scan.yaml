- model: scanEngine.enginetype
  pk: 1
  fields:
    engine_name: Full Scan
    default_engine: true
    yaml_configuration: |
      subdomain_discovery:
        uses_tools:
          - subfinder
          - chaos
          - ctfr
          - sublist3r
          - tlsx
          - oneforall
          - netlas
          - baddns
        enable_http_crawl: true
        threads: 30
        timeout: 5
        bbot: false
      dns_security:
        enable_axfr: true
        enable_dnssec_check: true
        enable_dns_brute: false
        amplification_threshold: 10
      http_crawl: {}
      port_scan:
        enable_http_crawl: true
        timeout: 5
        ports:
          - top-1000
        rate_limit: 150
        threads: 30
        passive: false
        enable_nmap: true
        nmap_cmd: nmap -vv -Pn -sV
        nmap_script: /usr/share/nmap/scripts/vulners.nse
        enable_network_enum: true
      vigolium_discovery:
        run_vigolium_discovery: true
        strategy: balanced
        concurrency: 20
        rate_limit: 50
        timeout: 10s
      screenshot:
        enable_http_crawl: true
        intensity: normal
        timeout: 10
        threads: 40
      fetch_url:
        uses_tools:
          - gospider
          - hakrawler
          - waybackurls
          - katana
          - gau
          - vigolium
        remove_duplicate_endpoints: true
        duplicate_fields:
          - content_length
          - page_title
        enable_http_crawl: true
        gf_patterns:
          - debug_logic
          - idor
          - interestingEXT
          - interestingparams
          - interestingsubs
          - lfi
          - rce
          - redirect
          - sqli
          - ssrf
          - ssti
          - xss
        ignore_file_extensions:
          - png
          - jpg
          - jpeg
          - gif
          - mp4
          - mpeg
          - mp3
        threads: 30
      dir_file_fuzz:
        auto_calibration: true
        run_dirsearch: true
        enable_http_crawl: true
        rate_limit: 150
        extensions:
          - html
          - php
          - git
          - yaml
          - conf
          - cnf
          - config
          - gz
          - env
          - log
          - db
          - mysql
          - bak
          - asp
          - aspx
          - txt
          - sql
          - json
          - yml
          - pdf
        follow_redirect: false
        max_time: 300
        match_http_status:
          - 200
          - 204
        recursive_level: 2
        stop_on_error: false
        timeout: 5
        threads: 30
        wordlist_name: dicc
        use_api_wordlist: false
      param_discovery:
        enabled: true
        min_confidence: 50
      osint:
        discover:
          - emails
          - metainfo
          - employees
        dorks:
          - login_pages
          - admin_panels
          - dashboard_pages
          - stackoverflow
          - social_media
          - project_management
          - code_sharing
          - config_files
          - jenkins
          - wordpress_files
          - php_error
          - exposed_documents
          - db_files
          - git_exposed
        intensity: normal
        documents_limit: 50
        leaks_and_secrets:
          leaklookup: true
          gitleaks: true
          trufflehog: true
      web_api_discovery:
        uses_tools:
          - kiterunner
          - arjun
          - linkfinder
          - paramspider
          - aquatone
          - semgrep
          - retire
          - jwt_tool
          - graphql-cop
        scan_only_active: true
        threads: 30
        kr_wordlist: routes-large.kite
        arjun_methods: GET,POST,JSON,XML,FETCH,PUT,DELETE,PATCH
        use_api_wordlist: false
      vigolium_analysis:
        run_vigolium_analysis: true
        strategy: balanced
        concurrency: 20
        rate_limit: 50
        timeout: 10s
      waf_detection:
        use_shodan: true
        use_censys: true
      vulnerability_scan:
        run_nuclei: true
        run_dalfox: true
        run_crlfuzz: true
        run_acunetix: true
        run_wpscan: true
        run_wptaint_scan: true
        run_s3scanner: true
        run_vigolium: true
        enable_http_crawl: true
        concurrency: 50
        intensity: normal
        rate_limit: 150
        retries: 1
        timeout: 5
        fetch_gpt_report: true
        nuclei:
          use_nuclei_config: false
          max_templates_per_batch: 100
          auto_update_templates: true
          severities:
            - unknown
            - info
            - low
            - medium
            - high
            - critical
        dalfox:
          waf_evasion: false
          deep_scan: false
          scan_timeout: 300
        s3scanner:
          threads: 10
          providers:
            - aws
            - gcp
            - digitalocean
            - dreamhost
            - linode
        vigolium:
          strategy: balanced
          concurrency: 50
          rate_limit: 100
          timeout: 15s
        cpanel_scanner:
          run_cpanel2shell: true
          cpanel_user_wordlist: /usr/src/app/wordlist/cpanel_users.txt
          proxy_type: rotating
        wpscan_enumeration: vp,vt,u
        wpscan_detection_mode: mixed
      waf_bypass:
        use_nuclei: true
        use_benchmarking: true
      firewall_vpn_scan:
        run_ike_scan: true
        run_sslscan: true
        enable_testssl: true
        enable_crt_sh: true
        ports:
          - 443
          - 4444
          - 8443
        threads: 20
      attack_path_modeling:
        enabled: true
        top_n: 10
      spiderfoot_scan:
        modules: all
      stress_test:
        uses_tools:
          - k6
          - wrk
          - hping3
          - locust
        concurrency: 50
        duration: 30s
        rate_limit: 100
        kill_switch: true
        intensity: normal
      secret_scanning:
        trufflehog: true
        gitleaks: true
        leaklookup: true
      code_scan:
        grype: true
        trivy: true
      cidr_recon:
        use_arp: false
      host_recon:
        run_nuclei: false
      url_fuzz:
        fuzzers:
          - ffuf
          - feroxbuster
        hunt_secrets: false
      url_crawl:
        passive: false
        active: false
        hunt_secrets: false
      url_params_fuzz:
        fuzz_values: false
        hunt_secrets: false
