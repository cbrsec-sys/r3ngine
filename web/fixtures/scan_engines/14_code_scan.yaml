        intensity: balanced
        use_ai: false
        timeout: 3600
      vulnerability_scan:
        run_nuclei: false
        run_dalfox: false
        run_crlfuzz: false
        run_acunetix: false
        run_wpscan: false
        run_vigolium: false
        enable_http_crawl: false
