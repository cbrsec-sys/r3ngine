- model: scanEngine.enginetype
  pk: 6
  fields:
    engine_name: reNgine Recommended
    default_engine: true
    yaml_configuration: |
      subdomain_discovery:
        uses_tools:
          - subfinder
          - chaos
          - ctfr
          - sublist3r
          - tlsx
          - oneforall
          - netlas
          - baddns
        enable_http_crawl: true
        threads: 30
        timeout: 5
      http_crawl: {}
      osint:
        discover:
          - emails
          - metainfo
        dorks:
          - login_pages
          - admin_panels
          - dashboard_pages
          - config_files
          - exposed_documents
        intensity: normal
        documents_limit: 50
      vulnerability_scan:
        run_nuclei: true
        run_dalfox: true
        run_crlfuzz: true
        run_acunetix: true
        enable_http_crawl: false
        concurrency: 50
        intensity: normal
        rate_limit: 150
        retries: 1
        timeout: 5
        fetch_gpt_report: false
        nuclei:
          use_nuclei_config: false
          severities:
            - low
            - medium
            - high
            - critical
      attack_path_modeling:
        enabled: true
      waf_detection:
        use_shodan: true
        use_censys: true
      waf_bypass:
        use_nuclei: true
        use_benchmarking: true
      dns_security:
        enable_axfr: true
        enable_dnssec_check: true
        enable_dns_brute: false
        amplification_threshold: 10
      spiderfoot_scan:
        modules: all
