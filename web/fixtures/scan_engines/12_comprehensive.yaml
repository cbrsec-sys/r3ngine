- model: scanEngine.enginetype
  pk: 12
  fields:
    engine_name: Comprehensive
    default_engine: false
    yaml_configuration: |
      subdomain_discovery:
        uses_tools:
          - subfinder
          - chaos
          - ctfr
          - sublist3r
          - tlsx
          - oneforall
          - netlas
          - baddns
        enable_http_crawl: true
        threads: 30
        timeout: 5
      firewall_vpn_scan:
        run_ike_scan: true
        run_sslscan: true
        enable_testssl: true
        enable_crt_sh: true
        threads: 20
      dns_security:
        enable_axfr: true
        enable_dnssec_check: true
        enable_dns_brute: false
        amplification_threshold: 10
      http_crawl: {}
      port_scan:
        enable_http_crawl: true
        timeout: 5
        ports:
          - top-100
        rate_limit: 150
        threads: 20
        passive: false
        enable_nmap: true
        nmap_cmd: nmap -vv -Pn -sV
        nmap_script: /usr/share/nmap/scripts/vulners.nse
        enable_network_enum: true
      osint:
        discover:
          - emails
          - metainfo
          - employees
        dorks:
          - login_pages
          - admin_panels
          - dashboard_pages
          - stackoverflow
          - social_media
          - project_management
          - code_sharing
          - config_files
          - jenkins
          - wordpress_files
          - php_error
          - exposed_documents
          - db_files
          - git_exposed
        intensity: normal
        documents_limit: 50
        leaks_and_secrets:
          leaklookup: true
          gitleaks: true
          trufflehog: true
      dir_file_fuzz:
        auto_calibration: true
        run_dirsearch: true
        enable_http_crawl: true
        rate_limit: 150
        extensions:
          - html
          - php
          - git
          - yaml
          - conf
          - cnf
          - config
          - gz
          - env
          - log
          - db
          - mysql
          - bak
          - asp
          - aspx
          - txt
          - conf
          - sql
          - json
          - yml
          - pdf
        follow_redirect: true
        max_time: 300
        match_http_status:
          - 200
          - 204
        recursive_level: 2
        stop_on_error: false
        timeout: 300
        threads: 20
        wordlist_name: dicc
        use_api_wordlist: false
      fetch_url:
        uses_tools:
          - gospider
          - hakrawler
          - waybackurls
          - katana
          - gau
          - vigolium
        remove_duplicate_endpoints: true
        duplicate_fields:
          - content_length
          - page_title
        enable_http_crawl: true
        gf_patterns:
          - debug_logic
          - idor
          - interestingEXT
          - interestingparams
          - interestingsubs
          - lfi
          - rce
          - redirect
          - sqli
          - ssrf
          - ssti
          - xss
        ignore_file_extensions:
          - png
          - jpg
          - jpeg
          - gif
          - mp4
          - mpeg
          - mp3
        threads: 20
      web_api_discovery:
        uses_tools:
          - arjun
          - linkfinder
          - paramspider
          - semgrep
          - retire
          - jwt_tool
          - graphql-cop
        scan_only_active: true
        threads: 30
        kiterunner_wordlist: routes-small.kr
        arjun_methods: GET,POST,JSON,XML,FETCH,PUT,DELETE,PATCH
      vulnerability_scan:
        run_nuclei: true
        run_dalfox: true
        run_crlfuzz: false
        run_acunetix: false
        run_wpscan: true
        run_s3scanner: true
        enable_http_crawl: true
        concurrency: 30
        intensity: normal
        rate_limit: 150
        retries: 1
        timeout: 0
        fetch_gpt_report: true
        nuclei:
          use_nuclei_config: false
          severities:
            - unknown
            - info
            - low
            - medium
            - high
            - critical
        run_vigolium: true
        vigolium:
          strategy: balanced
          concurrency: 30
          rate_limit: 100
          timeout: 300s
        cpanel_scanner:
          run_cpanel2shell: true
          cpanel_user_wordlist: /usr/src/app/wordlist/cpanel_users.txt
          proxy_type: rotating
      vigolium_discovery:
        run_vigolium_discovery: true
        strategy: balanced
        concurrency: 20
        rate_limit: 50
        timeout: 180s
      vigolium_analysis:
        run_vigolium_analysis: true
        strategy: balanced
        concurrency: 20
        rate_limit: 50
        timeout: 600s
      waf_detection:
        use_shodan: true
        use_censys: true
      waf_bypass:
        use_nuclei: true
        use_benchmarking: true
      screenshot:
        enable_http_crawl: true
        intensity: normal
        timeout: 10
        threads: 40
      attack_path_modeling:
        enabled: true
        top_n: 10
