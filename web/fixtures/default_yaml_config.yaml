# Global vars for all tools
#
# custom_headers: ['Foo: bar', 'User-Agent: Anything']     # FFUF, Nuclei, Dalfox, CRL Fuzz, HTTP Crawl, Fetch URL, etc
# enable_http_crawl: true           # All tools
# timeout: 10                       # Subdomain discovery, Screenshot, Port scan, FFUF, Nuclei                       
# threads: 30                       # All tools
# rate_limit: 150                   # Port scan, FFUF, Nuclei
# intensity: 'normal'               # Screenshot (grab only the root endpoints of each subdomain), Nuclei (reduce number of endpoints to scan), OSINT (not implemented yet)
# retries: 1                        # Nuclei

subdomain_discovery: {
  'uses_tools': ['subfinder', 'ctfr', 'sublist3r', 'tlsx', 'oneforall', 'netlas', 'baddns'],  # amass-passive, amass-active, reconx All
  'enable_http_crawl': true,
  'threads': 30,
  'timeout': 5,
  # 'use_subfinder_config': false,
  # 'use_amass_config': false,
  # 'amass_wordlist': 'deepmagic.com-prefixes-top50000'
}
http_crawl: {
  # 'threads': 30,
  # 'follow_redirect': true
}
port_scan: {
  'enable_http_crawl': true,
  'timeout': 5,
  # 'exclude_ports': [],
  # 'exclude_subdomains': [],
  'ports': ['top-100'],
  'rate_limit': 150,
  'threads': 30,
  'passive': false,
  # 'use_naabu_config': false,
  # 'enable_nmap': true,
  # 'nmap_cmd': 'nmap -vv -Pn ',
  # 'nmap_script': '',
  # 'nmap_script_args': ''
}
osint: {
  'discover': [
      'emails',
      'metainfo',
      'employees'
    ],
  'dorks': [
    'login_pages',
    'admin_panels',
    'dashboard_pages',
    'stackoverflow',
    'social_media',
    'project_management',
    'code_sharing',
    'config_files',
    'jenkins',
    'wordpress_files',
    'php_error',
    'exposed_documents',
    'db_files',
    'git_exposed'
  ],
  'custom_dorks': [
    'site:_target_ ext:php',
    'site:_target_ intitle:"index of"',
    # { 'lookup_site': '_target_', 'lookup_extensions': 'php,asp,aspx' },
    # can be autogenerated during target creation
  ],
  'intensity': 'normal',
  'documents_limit': 50,
  'leaks_and_secrets': {
    'leaklookup': true,           # Query leak-lookup.com API for domain leaks
    'gitleaks': true,             # Scan discovered JS files for secrets using Gitleaks
    'trufflehog': true            # Scan discovered JS files for secrets using Trufflehog
  }
}
dir_file_fuzz: {
  'auto_calibration': true,
  'run_dirsearch': true,
  'enable_http_crawl': true,
  'rate_limit': 150,
  'extensions': ['html', 'php','git','yaml','conf','cnf','config','gz','env','log','db','mysql','bak','asp','aspx','txt','conf','sql','json','yml','pdf'],
  'follow_redirect': false,
  'max_time': 300,
  'match_http_status': [200, 204],
  'recursive_level': 2,
  'stop_on_error': false,
  'timeout': 5,
  'threads': 30,
  'wordlist_name': 'dicc'
}
fetch_url: {
  'uses_tools': ['gospider', 'hakrawler', 'waybackurls', 'katana', 'gau'],
  'remove_duplicate_endpoints': true,
  'duplicate_fields': ['content_length', 'page_title'],
  'enable_http_crawl': true,
  'gf_patterns': ['debug_logic', 'idor', 'interestingEXT', 'interestingparams', 'interestingsubs', 'lfi', 'rce', 'redirect', 'sqli', 'ssrf', 'ssti', 'xss'],
  'ignore_file_extensions': ['png', 'jpg', 'jpeg', 'gif', 'mp4', 'mpeg', 'mp3'],
  'threads': 30,
  # 'exclude_subdomains': false
}
vulnerability_scan: {
  'run_nuclei': true,
  'run_dalfox': false,
  'run_crlfuzz': false,
  'run_s3scanner': true,
  'run_acunetix': true,
  'run_wpscan': true,
  'run_wptaint_scan': true,
  'wpscan_enumeration': 'vp,vt,u',
  'wpscan_detection_mode': 'mixed',
  'enable_http_crawl': true,
  'concurrency': 50,
  'intensity': 'normal',
  'rate_limit': 150,
  'retries': 1,
  'timeout': 5,
  'fetch_gpt_report': true,
  'nuclei': {
    'use_nuclei_config': false,
    'severities': ['unknown', 'info', 'low', 'medium', 'high', 'critical'],
    # 'tags': [],                 # Nuclei tags (https://github.com/projectdiscovery/nuclei-templates)
    # 'templates': [],            # Nuclei templates (https://github.com/projectdiscovery/nuclei-templates)
    # 'custom_templates': []      # Nuclei custom templates uploaded in reNgine
  },
  'cpanel_scanner': {
    'run_cpanel2shell': true,
    'cpanel_user_wordlist': '/usr/src/app/wordlist/cpanel_users.txt',
    'proxy_type': 'rotating'
  },
  'run_vigolium': true,
  'vigolium': {
    'strategy': 'balanced',         # Options: fast, balanced, thorough
    'concurrency': 50,
    'rate_limit': 100,
    'timeout': '15s',
    # 'modules': [],                # Restrict to specific Vigolium modules (empty = all)
    # 'severity_filter': []         # known-issue-scan severities to include (empty = all)
  }
}
waf_detection: {
  'enable_http_crawl': true,
  'use_shodan': true,           # Use Shodan for Origin IP discovery
  'use_censys': true,           # Use Censys for Origin IP discovery
  # 'use_heuristics': true,      # Enable SSL serial and related subdomain heuristics
}
waf_bypass: {
  'enabled': true,
  'use_benchmarking': true,       # Test HTTP header manipulation (X-Forwarded-For, etc.)
  'use_nuclei': true,             # Use Nuclei bypass templates
  # 'nuclei_templates': [],       # Optional: Specific Nuclei templates for bypass
  # 'custom_headers': [],         # Optional: Additional headers to test for bypass
  # 'timeout': 10,                # Timeout for bypass requests
  # 'threads': 10                 # Higher concurrency for full scans
}
firewall_vpn_scan: {
  'run_ike_scan': true,           # Identify IPSec VPN endpoints
  'run_sslscan': true,            # Audit SSL/TLS on common firewall ports
  'ports': [443, 4444, 8443, 10443, 5443], # Expanded port list for full scan
}
brute_force_scan: {
  'users_wordlist': ['top-100-users', 'admin-users'], # Multiple wordlists
  'pass_wordlist': ['top-100-pass', 'common-firewall-pass'],
  'services': ['ssh', 'ftp', 'http', 'smb', 'rdp', 'telnet'],
  'max_retries': 3,
  # 'port': 443,
  # 'stop_on_success': true,
  # 'max_attempts_per_proxy': 5
}
spiderfoot_scan: {
  'modules': 'all',               # SF modules to run
  'intensity': 'normal',
  'threads': 10
}
screenshot: {
  'enable_http_crawl': true,
  'intensity': 'normal',
  'timeout': 10,
  'threads': 40
}
web_api_discovery: {
  'uses_tools': ['kiterunner', 'arjun', 'linkfinder', 'paramspider', 'aquatone', 'semgrep', 'retire'],
  'scan_only_active': true,
  'threads': 30,
  'timeout': 5,
  'kr_wordlist': 'routes-small.kr'
}
param_discovery: {
  'enabled': true,
  'min_confidence': 50
}
stress_test: {
  'uses_tools': ['k6', 'wrk', 'hping3', 'locust'],
  'concurrency': 100,
  'duration': '30s',
  'rate_limit': 150,
  'kill_switch': true,
  'intensity': 'normal',
  # 'custom_scenarios': false,
  # 'allow_l7': true,
  # 'allow_l4': false
}
attack_path_modeling: {
  'enabled': true,
  'top_n': 5
}
vigolium_discovery: {
  'run_vigolium_discovery': true,
  'strategy': 'balanced',           # Options: fast, balanced, thorough
  'concurrency': 20,
  'rate_limit': 50,
  'timeout': '10s'
}
vigolium_analysis: {
  'run_vigolium_analysis': true,
  'strategy': 'balanced',           # Options: fast, balanced, thorough
  'concurrency': 20,
  'rate_limit': 50,
  'timeout': '10s'
}

leaks_and_secrets: {
  'gitleaks': true,
  'trufflehog': true,
  'leaklookup': true
}
