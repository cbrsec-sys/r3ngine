# r3ngine PostgreSQL tuning
# Loaded via the custom Dockerfile at docker/postgres/Dockerfile.

# Connection limit — default 100 is exhausted by concurrent Temporal activity
# threads + Gunicorn workers + Temporal server's own connections.
# Budget: web(8) + temporal-orchestrator(50) + temporal-server(15) + misc(27) = 100
# Setting to 200 gives headroom for scan spikes.
max_connections = 200

# Shared buffer cache — PostgreSQL default is 128MB which is conservative.
# 256MB is safe for the 1G container memory limit.
shared_buffers = 256MB

# Reduce idle connection overhead
idle_in_transaction_session_timeout = 30000   # 30s — kill stuck transactions
statement_timeout = 300000                     # 5min — kill runaway queries
