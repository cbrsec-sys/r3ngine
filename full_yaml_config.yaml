# r3ngine Full YAML Configuration Reference
#
# This file documents every available configuration key for all scan engines
# and standalone workflows. Copy relevant sections into a scan engine's
# yaml_configuration field or use as a reference when configuring via the UI.
#
# Global keys (apply to all tasks unless overridden at the task level):
#   custom_headers: ['X-Custom: value', 'User-Agent: MyAgent']
#   enable_http_crawl: true
#   timeout: 10
#   threads: 30
#   rate_limit: 150
#   intensity: 'normal'       # 'normal' | 'deep'
#   retries: 1
#   user_agent: ''            # Custom User-Agent string
#
# Tools installed in the Docker image (reference):
#   Subdomain/DNS   : subfinder, dnsx, tlsx, ctfr, sublist3r, oneforall, netlas, baddns, chaos
#   ASN/WHOIS       : getasn, jswhois, whoisdomain
#   OSINT           : bbot, maigret, h8mail, holehe, spiderfoot
#   HTTP/Crawl      : httpx, katana, gospider, hakrawler, cariddi, gau, waybackurls,
#                     xurlfind3r, urlfinder, unfurl (urlparser)
#   Port/Network    : naabu, nmap, fping, arp-scan, mapcidr, arpscan (psutil netdetect)
#   Fuzzing         : ffuf, dirsearch, feroxbuster, arjun
#   Params          : paramspider, linkfinder
#   WAF             : wafw00f, nuclei bypass templates
#   Vuln            : nuclei, dalfox, crlfuzz, s3scanner, wpscan, wpprobe, vigolium,
#                     grype (CVE), trivy (secrets)
#   Secrets         : gitleaks, trufflehog, cariddi, bbot
#   API             : kiterunner, jwt_tool, graphql-cop, semgrep, retire
#   Network sec     : sshaudit, testssl, sslscan, ike-scan, nmap
#   Code scan       : grype (CVE), trivy (secrets v0.69.3 pinned), gitleaks, trufflehog, semgrep
#   Net enum        : enum4linux-ng (SMB), onesixtyone+snmpwalk (SNMP), ldapsearch (LDAP), rdp-sec-check
#   Brute force     : hydra
#   Bypass          : bup (bypass-url-parser)
#   Exploit         : searchsploit, search_vulns
#   OSINT identity  : maigret (username), h8mail (email)
#   Stress          : k6, wrk, hping3, locust

# ===========================================================================
# MASTER SCAN WORKFLOW — 7-Tier Pipeline
# (Used by MasterScanWorkflow via scan engine yaml_configuration)
# ===========================================================================

# ---------------------------------------------------------------------------
# TIER 1 — Subdomain Discovery
# ---------------------------------------------------------------------------
subdomain_discovery:
  uses_tools:
    - subfinder
    - chaos
    - ctfr
    - sublist3r
    - tlsx
    - oneforall
    - netlas
    - baddns
    # - amass-passive         # Passive amass enumeration
    # - amass-active          # Active amass enumeration (with wordlist)
  enable_http_crawl: true
  threads: 30
  timeout: 5
  bbot: false                   # bbot passive OSINT framework (slow but thorough; runs in SubdomainReconWorkflow)
  use_subfinder_config: false   # Use /root/.config/subfinder/config.yaml
  use_amass_config: false       # Use /root/.config/amass.ini
  amass_wordlist: deepmagic.com-prefixes-top50000  # Active brute-force wordlist

# ---------------------------------------------------------------------------
# TIER 1 — DNS Security
# ---------------------------------------------------------------------------
dns_security:
  enable_axfr: true                  # Zone transfer (AXFR) via dnsrecon
  enable_dnssec_check: true          # DNSSEC configuration check via dig
  enable_dns_brute: false            # Subdomain brute-force via fierce
  amplification_threshold: 10        # Amplification ratio threshold (UDP ANY query)

# ---------------------------------------------------------------------------
# TIER 1 — OSINT
# ---------------------------------------------------------------------------
osint:
  discover:
    - emails
    - metainfo
    - employees
  dorks:
    - login_pages
    - admin_panels
    - dashboard_pages
    - stackoverflow
    - social_media
    - project_management
    - code_sharing
    - config_files
    - jenkins
    - wordpress_files
    - php_error
    - exposed_documents
    - db_files
    - git_exposed
  custom_dorks:
    - 'site:_target_ ext:php'
    - 'site:_target_ intitle:"index of"'
    # - { lookup_site: '_target_', lookup_extensions: 'php,asp,aspx' }
  intensity: normal
  documents_limit: 50
  leaks_and_secrets:
    leaklookup: true      # Query leak-lookup.com API for domain leaks
    gitleaks: true        # Scan discovered JS files for secrets (gitleaks)
    trufflehog: true      # Scan discovered JS files for secrets (trufflehog)

# ---------------------------------------------------------------------------
# TIER 1 — SpiderFoot OSINT
# ---------------------------------------------------------------------------
spiderfoot_scan:
  modules: all
  intensity: normal
  threads: 10

# ---------------------------------------------------------------------------
# TIER 2 — HTTP Crawl
# ---------------------------------------------------------------------------
http_crawl: {}
  # threads: 30
  # follow_redirect: true

# ---------------------------------------------------------------------------
# TIER 2 — Port Scan
#   Network enumeration (SMB/SNMP/LDAP/RDP) runs automatically when
#   enable_network_enum: true and the relevant port is discovered.
#   Port 22   → sshaudit (SSH configuration audit)
#   Port 445  → enum4linux-ng (SMB enumeration)
#   Port 161  → onesixtyone + snmpwalk (SNMP enumeration)
#   Port 389  → ldapsearch (LDAP anonymous bind)
#   Port 3389 → rdp-sec-check (RDP algorithm audit)
# ---------------------------------------------------------------------------
port_scan:
  enable_http_crawl: true
  timeout: 5
  ports:
    - top-100          # 'full' | 'all' | 'top-100' | 'top-1000' | explicit e.g. '22,80,443'
  rate_limit: 150
  threads: 30
  passive: false
  use_naabu_config: false                           # Use /root/.config/naabu/config.yaml
  exclude_ports: []                                 # Ports to exclude
  exclude_subdomains: false                         # Exclude subdomains from scan
  enable_nmap: true                                 # Run nmap post-scan for service/vuln detection
  nmap_cmd: 'nmap -vv -Pn '                         # Raw nmap arguments appended to base command
  nmap_script: '/usr/share/nmap/scripts/vulners.nse'  # NSE script(s) e.g. 'http-headers,ssl-cert'
  nmap_script_args: ''                              # Arguments for NSE scripts
  enable_network_enum: true                         # Enable SMB/SNMP/LDAP/RDP/SSH protocol enumeration

# ---------------------------------------------------------------------------
# TIER 2 — Vigolium Discovery (passive)
# ---------------------------------------------------------------------------
vigolium_discovery:
  run_vigolium_discovery: true
  strategy: balanced         # fast | balanced | thorough
  concurrency: 20
  rate_limit: 50
  timeout: 10s

# ---------------------------------------------------------------------------
# TIER 3 — Screenshot
# ---------------------------------------------------------------------------
screenshot:
  enable_http_crawl: true
  intensity: normal          # 'normal' = root endpoints only | 'deep' = all endpoints
  timeout: 10
  threads: 40

# ---------------------------------------------------------------------------
# TIER 3 — URL Fetching
# ---------------------------------------------------------------------------
fetch_url:
  uses_tools:
    - gospider
    - hakrawler
    - waybackurls
    - katana
    - gau
    - vigolium
  remove_duplicate_endpoints: true
  duplicate_fields:
    - content_length
    - page_title
  enable_http_crawl: true
  gf_patterns:
    - debug_logic
    - idor
    - interestingEXT
    - interestingparams
    - interestingsubs
    - lfi
    - rce
    - redirect
    - sqli
    - ssrf
    - ssti
    - xss
  ignore_file_extensions:
    - png
    - jpg
    - jpeg
    - gif
    - mp4
    - mpeg
    - mp3
  threads: 30
  exclude_subdomains: false

# ---------------------------------------------------------------------------
# TIER 4 — Directory & File Fuzzing
# ---------------------------------------------------------------------------
dir_file_fuzz:
  auto_calibration: true
  run_dirsearch: true
  enable_http_crawl: true
  rate_limit: 150
  extensions:
    - html
    - php
    - git
    - yaml
    - conf
    - cnf
    - config
    - gz
    - env
    - log
    - db
    - mysql
    - bak
    - asp
    - aspx
    - txt
    - sql
    - json
    - yml
    - pdf
  follow_redirect: false
  max_time: 300
  match_http_status:
    - 200
    - 204
  recursive_level: 2
  stop_on_error: false
  timeout: 5
  threads: 30
  wordlist_name: dicc
  use_api_wordlist: false     # Use API-specific wordlist instead of dicc

# ---------------------------------------------------------------------------
# TIER 5 — Web API & Parameter Discovery
# ---------------------------------------------------------------------------
web_api_discovery:
  uses_tools:
    - kiterunner
    - arjun
    - linkfinder
    - paramspider
    - aquatone
    - semgrep
    - retire
    - jwt_tool
    - graphql-cop
  scan_only_active: true
  threads: 30
  timeout: 5
  kiterunner_wordlist: routes-large.kite  # kiterunner routes wordlist
  arjun_methods: GET,POST,JSON,XML,FETCH,PUT,DELETE,PATCH
  use_api_wordlist: false     # Use API wordlist for dir_file_fuzz integration

# ---------------------------------------------------------------------------
# TIER 5 — Vigolium Analysis (active)
# ---------------------------------------------------------------------------
vigolium_analysis:
  run_vigolium_analysis: true
  strategy: balanced         # fast | balanced | thorough
  concurrency: 20
  rate_limit: 50
  timeout: 10s

# ---------------------------------------------------------------------------
# TIER 5 — WAF Detection
# ---------------------------------------------------------------------------
waf_detection:
  enable_http_crawl: true
  use_shodan: true            # Use Shodan for origin IP discovery
  use_censys: true            # Use Censys for origin IP discovery

# ---------------------------------------------------------------------------
# TIER 5 — Secret Scanning
#   Runs trufflehog, gitleaks, and leak-lookup against discovered JS files
#   and crawled content. Also called by CodeScanWorkflow for full repo scans.
# ---------------------------------------------------------------------------
secret_scanning:
  trufflehog: true            # Trufflehog v3 filesystem / JS secret scan
  gitleaks: true              # Gitleaks v8 detect mode on JS files
  leaklookup: true            # Query leak-lookup.com API

# ---------------------------------------------------------------------------
# TIER 6 — Vulnerability Scan
# ---------------------------------------------------------------------------
vulnerability_scan:
  run_nuclei: true
  run_dalfox: true
  run_crlfuzz: true
  run_acunetix: true                 # Requires AcunetixAPIKey configured in Django admin
  run_wpscan: true
  run_wptaint_scan: true
  run_s3scanner: true
  run_vigolium: true
  enable_http_crawl: true
  concurrency: 50
  intensity: normal
  rate_limit: 150
  retries: 1
  timeout: 5
  fetch_gpt_report: true

  # Acunetix (AWVS) Configuration
  # These settings control how vulnerability scans interact with Acunetix
  acunetix:
    # Maximum time to wait for a scan to complete (in seconds)
    # Default: 43200 (12 hours)
    # Env var: ACUNETIX_MAX_RETRIES (value is number of 30-second intervals)
    max_retries: 720

    # Interval between scan status polls (in seconds)
    # Default: 30 seconds
    # Increase this if your Acunetix instance is slow or has rate limits
    # Env var: ACUNETIX_POLL_INTERVAL
    poll_interval: 30

    # Timeout for individual Acunetix API requests (in seconds)
    # Default: 30 seconds
    # Increase for slow networks or large scans
    # Env var: ACUNETIX_REQUEST_TIMEOUT
    request_timeout: 30

  nuclei:
    use_nuclei_config: false
    auto_update_templates: true
    severities:
      - unknown
      - info
      - low
      - medium
      - high
      - critical
    tags: []                      # Filter by nuclei template tags
    templates: []                 # Specific templates/paths to run
    custom_templates: []          # Custom templates uploaded in r3ngine

  dalfox:
    waf_evasion: false
    deep_scan: false
    remote_payloads: false
    remote_wordlists: false
    scan_timeout: 300
    blind_xss_server: ''          # Blind XSS callback server URL
    user_agent: ''
    timeout: 30
    delay: 0
    threads: 10

  s3scanner:
    threads: 10
    providers:
      - aws
      - gcp
      - digitalocean
      - dreamhost
      - linode

  vigolium:
    strategy: balanced            # fast | balanced | thorough
    concurrency: 50
    rate_limit: 100
    timeout: 15s
    modules: []                   # Restrict to specific modules (empty = all)
    severity_filter: []           # Severity levels to include (empty = all)

  cpanel_scanner:
    run_cpanel2shell: true
    cpanel_user_wordlist: /usr/src/app/wordlist/cpanel_users.txt
    proxy_type: rotating

  wpscan_enumeration: vp,vt,u     # WPScan enumeration options
  wpscan_detection_mode: mixed    # mixed | passive | aggressive

# ---------------------------------------------------------------------------
# TIER 6 — WAF Bypass
# ---------------------------------------------------------------------------
waf_bypass:
  enabled: true
  use_nuclei: true              # Use nuclei WAF bypass templates
  use_benchmarking: true        # Test HTTP header manipulation (X-Forwarded-For etc.)

# ---------------------------------------------------------------------------
# TIER 6 — Brute Force Scan
# ---------------------------------------------------------------------------
brute_force_scan:
  users_wordlist:
    - top_default_usernames.txt
    - most_common_usernames.txt
  pass_wordlist:
    - top_default_passwords.txt
    - most_common_passwords.txt
  services:
    - ssh
    - ftp
    - http
    - smb
    - rdp
    - telnet
  threads: 5
  stop_on_success: true
  max_retries: 3

# ---------------------------------------------------------------------------
# TIER 6 — Firewall & VPN Scan
#   testssl.sh runs a per-finding TLS deep audit (one Vulnerability per finding).
#   sslscan provides a summary SSL/TLS configuration audit.
#   ike-scan detects IPSec VPN services.
# ---------------------------------------------------------------------------
firewall_vpn_scan:
  run_ike_scan: true
  run_sslscan: true
  enable_testssl: true          # testssl.sh full TLS audit (one vuln per finding)
  enable_crt_sh: true           # Query crt.sh for certificate transparency subdomains
  ports:
    - 443
    - 4444
    - 8443
  threads: 20

# ---------------------------------------------------------------------------
# TIER 7 — Attack Path Modeling
# ---------------------------------------------------------------------------
attack_path_modeling:
  enabled: true
  top_n: 10

# ===========================================================================
# STANDALONE WORKFLOWS
# (Triggered via StartWorkflowView API or Workflow Launcher UI)
# These keys are only read when the corresponding standalone workflow runs.
# ===========================================================================

# ---------------------------------------------------------------------------
# SubdomainReconWorkflow
#   Passive/brute-force subdomain discovery + HTTP probe + takeover check.
#   Tools: subfinder, gau (passive), dnsx (brute), httpx, nuclei[takeover]
# ---------------------------------------------------------------------------
subdomain_recon:
  passive: false                # Passive sources only — skip DNS brute force
  brute_dns: false              # DNS brute force via dnsx wordlist
  bbot: false                   # bbot OSINT framework for additional discovery (slow)

# ---------------------------------------------------------------------------
# DomainReconWorkflow
#   WHOIS + ASN + DNS + passive URL collection, then HTTP probe + WAF + testssl.
#   Tools: getasn, jswhois, whoisdomain, dnsx, xurlfind3r, httpx, wafw00f, testssl
# ---------------------------------------------------------------------------
domain_recon:
  passive: false                # WHOIS/DNS/ASN only; skip HTTP probe, testssl, WAF detection

# ---------------------------------------------------------------------------
# HostReconWorkflow
#   Port scan (naabu + nmap) → service CVE lookup → SSH audit → HTTP probe.
#   getasn enriches discovered IPs with ASN/CIDR/org data.
# ---------------------------------------------------------------------------
host_recon:
  run_nuclei: false             # Run nuclei [network,ssl] scan after port scan (slow)

# ---------------------------------------------------------------------------
# CIDRReconWorkflow
#   Network range discovery → alive host detection → port scan → HTTP probe.
#   When no cidr target is provided, netdetect auto-discovers local network CIDR ranges
#   via psutil interface enumeration.
# ---------------------------------------------------------------------------
cidr_recon:
  use_arp: false                # Use ARP scan for host discovery (requires NET_RAW capability)
  # When no cidr target is given and use_arp is false:
  #   → netdetect enumerates local network interfaces to determine CIDR automatically
  #   → then fping sweeps the detected CIDR for alive hosts
  #   → mapcidr expands the CIDR to individual IPs for port scanning

# ---------------------------------------------------------------------------
# CodeScanWorkflow
#   Source code / filesystem vulnerability and secrets scanning.
#   Tools: gitleaks, trufflehog (via secret_scanning), semgrep, grype, trivy
#   Note: grype and trivy always run when this workflow is triggered.
# ---------------------------------------------------------------------------
code_scan:
  grype: true                   # Anchore Grype — CVE scanner for installed packages/dependencies
  trivy: true                   # Aqua Trivy v0.69.3 — filesystem secrets scanner
                                # (pinned pre-compromise; v0.69.4 had supply chain attack Mar 2026)

# ---------------------------------------------------------------------------
# URLCrawlWorkflow
#   Passive URL discovery (xurlfind3r, urlfinder, gau) + active crawl
#   (katana, cariddi) + HTTP probe + optional secret hunt + urlparser.
#   urlparser (unfurl) extracts unique query-string parameters from crawled URLs.
# ---------------------------------------------------------------------------
url_crawl:
  passive: false                # Passive discovery only (skip katana/cariddi active crawl)
  active: false                 # Active crawl only (skip passive xurlfind3r/urlfinder/gau)
  hunt_secrets: false           # Run trufflehog + maigret OSINT after active crawl

# ---------------------------------------------------------------------------
# URLDirSearchWorkflow
#   HTTP probe → ffuf directory mode → optional secret scan.
# ---------------------------------------------------------------------------
url_dirsearch:
  hunt_secrets: false           # Run trufflehog after directory discovery

# ---------------------------------------------------------------------------
# URLFuzzWorkflow
#   Comprehensive URL fuzzing with feroxbuster and/or ffuf.
#   urlparser (unfurl) is NOT called in this workflow (params come pre-discovered).
# ---------------------------------------------------------------------------
url_fuzz:
  fuzzers:
    - ffuf                      # ffuf directory/file fuzzing
    - feroxbuster               # feroxbuster recursive content discovery
  hunt_secrets: false           # Run trufflehog after fuzzing

# ---------------------------------------------------------------------------
# URLParamsFuzzWorkflow
#   HTTP probe → urlparser (unfurl, passive harvest) → arjun (active discovery)
#   → optional ffuf value fuzzing.
#   urlparser runs first to quickly harvest params from already-crawled URLs
#   before arjun actively probes for additional parameters.
# ---------------------------------------------------------------------------
url_params_fuzz:
  fuzz_values: false            # Fuzz discovered parameter values with ffuf
  hunt_secrets: false           # Run trufflehog after parameter fuzzing

# ---------------------------------------------------------------------------
# URLVulnWorkflow
#   gf pattern matching (xss/lfi/ssrf/rce/idor/debug_logic) → dalfox XSS
#   attack on matched URLs → optional nuclei HTTP scan.
# ---------------------------------------------------------------------------
url_vuln:
  nuclei: false                 # Run nuclei HTTP scan (exclude network/ssl/file/dns/osint tags)

# ---------------------------------------------------------------------------
# URLBypassWorkflow
#   Attempt 4xx bypass on a list of URLs using bup (bypass-url-parser).
# ---------------------------------------------------------------------------
url_bypass: {}
  # No additional configuration keys at this time.
  # Provide target URLs via the workflow context.

# ---------------------------------------------------------------------------
# WordPressWorkflow
#   HTTP probe → wpscan + wpprobe (parallel) → nuclei[wordpress].
# ---------------------------------------------------------------------------
wordpress: {}
  # No additional configuration keys at this time.
  # wpscan_enumeration and wpscan_detection_mode can be set here in future.

# ---------------------------------------------------------------------------
# UserHuntWorkflow
#   Username OSINT via maigret OR email breach search via h8mail.
#   Dispatches based on target_type: 'username' | 'email'.
# ---------------------------------------------------------------------------
user_hunt: {}
  # No additional configuration keys at this time.
  # Triggered by setting target_type='username' or target_type='email' in context.

# ===========================================================================
# STANDALONE TOOLS (informational reference)
# These tools are called automatically by workflows and do not require
# explicit configuration keys unless noted above.
# ===========================================================================

# getasn       — Enriches discovered IPs with ASN number, CIDR, and organization.
#                Called after port scan in DomainReconWorkflow + HostReconWorkflow.
#                No configuration required.

# jswhois      — JSON WHOIS lookup (Go binary). Runs in DomainReconWorkflow.
#                Output stored in DomainInfo.whois_raw. No configuration required.

# whoisdomain  — Python WHOIS lookup. Runs in DomainReconWorkflow.
#                Output stored in DomainInfo.whois_raw. No configuration required.

# netdetect    — Local network CIDR auto-discovery via psutil interface enumeration.
#                Runs in CIDRReconWorkflow when no CIDR target is provided.
#                No configuration required (controlled by cidr_recon.use_arp above).

# urlparser    — URL parameter extraction using unfurl (/usr/local/bin/unfurl).
#                Runs in URLParamsFuzzWorkflow (before arjun) and URLCrawlWorkflow.
#                Outputs unique key=value pairs stored as Parameter records.
#                No configuration required.

# feroxbuster  — Recursive content discovery. Runs in URLFuzzWorkflow when
#                'feroxbuster' is in url_fuzz.fuzzers (see above).

# grype        — Anchore Grype CVE scanner. Runs in CodeScanWorkflow.
#                Pinned to v0.114.0. Stores findings as Vulnerability records.
#                Controlled by code_scan.grype above.

# trivy        — Aqua Trivy secrets scanner. Runs in CodeScanWorkflow.
#                Pinned to v0.69.3 (v0.69.4 was compromised March 2026).
#                Stores findings as SecretLeak records.
#                Controlled by code_scan.trivy above.

# bbot         — Bit Bounce OSINT Tool. Runs in SubdomainReconWorkflow
#                when subdomain_recon.bbot: true. Discovers additional subdomains
#                via passive OSINT; stores as Subdomain records.

# sshaudit     — SSH configuration audit. Runs automatically in HostReconWorkflow
#                and MasterScanWorkflow when port 22 is discovered.

# search_vulns — CVE lookup per discovered service/version. Fans out from
#                HostReconWorkflow and MasterScanWorkflow after port scan.

# searchsploit — Exploit-DB lookup per service. Same fan-out as search_vulns.

# ===========================================================================
# STRESS TESTING (standalone, triggered separately)
# ===========================================================================
stress_test:
  uses_tools:
    - k6
    - wrk
    - hping3
    - locust
  concurrency: 50
  duration: 30s
  rate_limit: 100
  kill_switch: true
  intensity: normal
  allow_l7: true
  allow_l4: false
