{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reNgine V3 | {{ project.name }}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'vite.svg' %}" />
    <!-- Orbitron & Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    {% if debug %}
    <script type="module">
      import RefreshRuntime from 'https://localhost:5173/@react-refresh'
      RefreshRuntime.injectIntoGlobalHook(window)
      window.$RefreshReg$ = () => {}
      window.$RefreshSig$ = () => (type) => type
      window.__vite_plugin_react_preamble_installed__ = true
    </script>
    <script type="module" src="https://localhost:5173/@vite/client"></script>
    <script type="module" src="https://localhost:5173/src/main.tsx"></script>
    {% else %}
    <link rel="stylesheet" href="{% static 'assets/index.css' %}">
    <script type="module" src="{% static 'assets/index.js' %}"></script>
    {% endif %}
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
