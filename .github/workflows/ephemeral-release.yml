name: Ephemeral Release (v3.0.0-beta)

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.0.0-beta
          name: "v3 Phoenix Release"
          body: |
            # ⚡ reNgine v3.0.0: The Phoenix Rebirth ⚡

The most powerful automated reconnaissance framework has been completely reimagined. **reNgine v3 "Phoenix Rebirth"** is not just an update—it's an architectural evolution designed for the next generation of security researchers and red teams.

---

## 🎨 Tactical Glassmorphic UI
Say goodbye to the legacy interface. Experience a **high-performance React 19 frontend** built with a tactical, cyberpunk aesthetic. 
- **Modern Aesthetics**: Sleek glassmorphism, fluid micro-animations, and a dedicated dark mode designed for long nights in the SOC.
- **Lightning Fast**: Optimized state management with React Query ensures your data is always in sync and your interface is always responsive.

## 🧩 Modular Plugin Ecosystem
Unleash the full potential of your toolbox. reNgine v3 introduces a **Robust Plugin Lifecycle** that allows you to:
- **Instant Integration**: Upload, toggle, and manage custom security tools as modular plugins.
- **Unified Inventory**: Keep your tactical assets organized with the new Plugin Inventory and Pipeline Builder.
- **Seamless Orchestration**: Custom plugins now integrate directly into your core scan workflows.

## 🚀 ASRE: Adaptive Stress & Resilience Engine
Go beyond simple scanning. The new **ASRE** orchestrates high-performance load testing and resilience checks:
- **Tool Orchestration**: Seamlessly manage `k6`, `wrk`, `hping3`, and `Locust`.
- **Attack Surface Graph**: Visualize how your infrastructure handles stress in real-time.
- **Resilience Scoring**: Quantify the hardening of your targets under simulated pressure.

## 🤖 ImpactExplorer AI
Static reports are a thing of the past. Our new **ImpactExplorer** modal provides persistent, AI-driven vulnerability assessments:
- **Contextual Analysis**: Deep-dive into the actual business impact of discovered vulnerabilities.
- **Actionable Intelligence**: Get tailored remediation strategies generated by AI based on your specific tech stack.

## 🕵️ Hardened OpSec & Stealth
Operate under the radar with our new **OpSec Settings Module**:
- **Stealth Presets**: Choose between *Quiet*, *Balanced*, and *Aggressive* profiles.
- **Advanced Evasion**: Automated User-Agent rotation, rate limiting, and WAF bypass headers come standard.

## 💎 Enterprise-Grade Reporting
Deliver results that impress. We've modernized the reporting engine with:
- **Cyber Pro Template**: A polished, professional print layout designed for executive presentation.
- **Timeline Assessments**: Beautifully visualized attack surface growth and discovery milestones.

---

### 🛠️ Technical Highlights
- **Unified Auth Intelligence**: Centralized `AuthCandidate` database for discovery-driven brute-force pipelines.
- **Playwright Evidence Subsystem**: Stable, high-fidelity headless screenshots powered by a robust Playwright architecture.
- **Hardened Backend**: SIGKILL-level task termination logic and atomic database operations for maximum stability.

**Welcome to the Rebirth. Welcome to reNgine v3.**

---
*Stay Tactical. Stay Rebellious.* 
🚀 [whiterabb17/r3ngine](https://github.com/whiterabb17/r3ngine)

          files: |
            .assets/banner.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Release CI
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git rm .github/workflows/ephemeral-release.yml
          git rm .assets/banner.png
          git commit -m "chore: cleanup ephemeral release CI for v3.0.0-beta"
          git push
